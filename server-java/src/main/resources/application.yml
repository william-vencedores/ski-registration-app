server:
  port: ${PORT:3001}

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production}
    expiration-hours: 8
  client-url: ${CLIENT_URL:http://localhost:5173}
  dynamodb:
    table-name: ${DYNAMODB_TABLE:VencedoresSkiTable}
    region: ${AWS_REGION:us-east-2}
    endpoint: ${DYNAMODB_ENDPOINT:}
  admin:
    default-username: ${ADMIN_USERNAME:admin}
    default-password: ${ADMIN_PASSWORD:changeme}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

spring:
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  web:
    resources:
      static-locations: classpath:/public/
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
