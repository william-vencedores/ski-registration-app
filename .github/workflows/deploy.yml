name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Build frontend ──────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build client
        run: cd client && npm run build

      # ── Build Java backend ──────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: 21
          cache: maven

      - name: Copy client build into Spring Boot static resources
        run: |
          mkdir -p server-java/src/main/resources/public
          cp -r client/dist/* server-java/src/main/resources/public/

      - name: Build Java backend
        run: cd server-java && mvn clean package -DskipTests -q

      # ── Package for Elastic Beanstalk ───────────────────────
      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp server-java/target/vencedores-ski-0.1.0.jar deploy/
          cp server-java/Procfile deploy/
          cd deploy
          zip -r ../deploy.zip .

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ secrets.EB_APP_NAME }}
          environment_name: ${{ secrets.EB_ENV_NAME }}
          region: ${{ secrets.AWS_REGION }}
          version_label: ${{ github.sha }}-${{ github.run_number }}
          use_existing_version_if_available: true
          deployment_package: deploy.zip
